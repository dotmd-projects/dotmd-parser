[project]
name = "dotmd-parser"
version = "0.1.0"
description = "Dependency graph parser for .md skill files — parse @include/@delegate directives, build graphs, resolve templates"
requires-python = ">=3.10"
license = "MIT"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
